name: Build TUI Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-13
            platform: darwin
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: windows
            arch: x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve packaged AgentSwarm version
        id: packaged_agentswarm
        shell: bash
        run: |
          version="$(node -p "require('./package.json').dependencies['@vrsen/agentswarm']")"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Expected package.json to pin an exact @vrsen/agentswarm version, got: $version"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Resolve OpenSwarm TUI source
        id: openswarm_tui
        shell: bash
        run: |
          repo="$(node -p "require('./package.json').openswarmTui?.buildRepo || ''")"
          ref="$(node -p "require('./package.json').openswarmTui?.buildRef || ''")"
          if [[ -z "$repo" || -z "$ref" ]]; then
            echo "::error::package.json must define openswarmTui.buildRepo and openswarmTui.buildRef"
            exit 1
          fi
          echo "repo=$repo" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          repository: ${{ steps.openswarm_tui.outputs.repo }}
          ref: ${{ steps.openswarm_tui.outputs.ref }}
          path: agentswarm-cli

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Install dependencies
        working-directory: agentswarm-cli
        run: bun install

      - name: Build binary
        working-directory: agentswarm-cli/packages/opencode
        run: bun run script/build.ts --single --skip-install

      - name: Rename binary (Unix)
        if: matrix.platform != 'windows'
        run: |
          mv agentswarm-cli/packages/opencode/dist/agentswarm-cli-${{ matrix.platform }}-${{ matrix.arch }}/bin/agentswarm \
             agentswarm-${{ matrix.platform }}-${{ matrix.arch }}

      - name: Rename binary (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Move-Item agentswarm-cli/packages/opencode/dist/agentswarm-cli-${{ matrix.platform }}-${{ matrix.arch }}/bin/agentswarm.exe `
            agentswarm-${{ matrix.platform }}-${{ matrix.arch }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentswarm-${{ matrix.platform }}-${{ matrix.arch }}
          path: agentswarm-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.platform == 'windows' && '.exe' || '' }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
